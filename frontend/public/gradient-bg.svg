<svg width="1200" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#06b6d4;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.2" />
    </linearGradient>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="30" />
    </filter>
  </defs>
  <rect width="1200" height="600" fill="#0b1020"/>
  <rect width="1200" height="600" fill="url(#grad1)"/>
  <circle cx="200" cy="100" r="150" fill="#0ea5e9" opacity="0.05" filter="url(#noise)"/>
  <circle cx="1000" cy="500" r="200" fill="#8b5cf6" opacity="0.04" filter="url(#noise)"/>
</svg>
